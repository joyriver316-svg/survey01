server {
    listen 80;
    server_name auracode.dplab.kr;

    root /var/www/auracode;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Caching for Vite static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    error_log /var/log/nginx/auracode_error.log;
    access_log /var/log/nginx/auracode_access.log;
}
